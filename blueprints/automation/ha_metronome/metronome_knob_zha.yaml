blueprint:
  name: "Metronome — ZHA Knob Controller"
  description: >
    Control the HA Metronome custom component with a ZHA rotary knob.

    **Press once** — start or stop the metronome.
    When starting, the click-track stream is sent to the chosen media player.

    **Double-press** — enter beats-per-measure adjustment mode.
    The metronome keeps playing; rotating now changes beats per measure instead
    of tempo.  The mode exits automatically after a configurable timeout, or
    immediately on the next press.

    **Rotate** — adjust tempo (normal mode) or beats per measure (adjustment mode).

    Tap/mode logic lives inside the `ha_metronome` custom component, so the
    automation just routes events — no timing hacks in YAML.

    ---
    **Finding your knob's ZHA command names**

    Open **Developer Tools → Events**, start listening for `zha_event`, then
    press and turn your knob.  Note the `command` field values.

    | Knob type                 | Press command   | Rotation (ZHA)      | Notes |
    |---------------------------|-----------------|---------------------|--------|
    | IKEA Symfonisk / Tradfri  | `toggle`        | `step` + `step_mode` | Default rotate settings. |
    | IKEA Tradfri dimmer       | `toggle`        | `move_with_on_off`  | Set **Rotation command** to that value; set CW/CCW mode inputs for `move_mode`. |
    | Tuya / TS004F scene **mode** (many smart scene knobs, e.g. C3006) | `toggle` (dimmer) or `press_type` (scene) | `right` / `left` | In **Scene** (event) mode the quirk often emits `command: right` and `left`, not `step`. This blueprint also listens for those. If press fails, see **Press command** below. |
    | Tuya / TS004F dimmer **mode** | `toggle`     | `step` + `step_mode` | Same as IKEA if the device is in level/dimmer mode. |

    In `step` / level mode: clockwise = `step_mode` 0 (increase) for most devices; the **Clockwise** / **CCW** inputs set which raw value means +1.

    For **Tuya** devices: put the remote in the mode you want (often long-press both buttons, or an attribute, depending on the model) so that rotation shows up as `right`/`left` in **Developer Tools → Events** if `step` never appears.

    ---
    **One physical turn, several `zha_event` commands (e.g. Tuya C3006)**  
    Some knobs report **`step` + `left`/`right` + `rotate_type` for a single detent.** If the blueprint used separate triggers, Home Assistant would call **rotate** once per event (tempo triples). This blueprint uses a **single device trigger** and the options **React to `step` / `left`&`right` / `rotate_type`**: turn off the ones you *don’t* want so only **one** is true.

    **Reference trace** in this repository: `zha_event.yaml` — on one detent, `left` and `rotate_type` (OnOff, cluster 6) arrive in the same millisecond, then `step` (Level, cluster 8) about **0.25s later**. Enable only **one** of the three; use `left`/`right` or `rotate_type` for snappy control, or `step` alone if you want a single level-cluster event (slight lag).

  domain: automation

  input:
    knob_device:
      name: Knob Device (ZHA)
      selector:
        device:
          integration: zha

    media_player:
      name: Media Player
      description: Speaker to stream the click track to.
      selector:
        entity:
          domain: media_player

    initial_bpm:
      name: Initial BPM
      description: Tempo used each time the metronome (re)starts.
      default: 120
      selector:
        number:
          min: 20
          max: 300
          step: 1
          unit_of_measurement: BPM
          mode: slider

    beats_per_measure:
      name: Initial beats per measure
      description: Starting value; can be changed later via double-tap.
      default: 4
      selector:
        number:
          min: 1
          max: 16
          step: 1
          mode: box

    click_sound:
      name: Click sound
      description: Sound set to use (without _hi/_lo.wav suffix).
      default: "Perc_MetronomeQuartz"
      selector:
        select:
          options:
            - "Perc_Can"
            - "Perc_Castanet"
            - "Perc_Chair"
            - "Perc_Clackhead"
            - "Perc_Clap"
            - "Perc_ClickToy"
            - "Perc_Glass"
            - "Perc_HeadKnock"
            - "Perc_Keyboard"
            - "Perc_Metal"
            - "Perc_MetronomeQuartz"
            - "Perc_MouthPop"
            - "Perc_MusicStand"
            - "Perc_PracticePad"
            - "Perc_Snap"
            - "Perc_Squeak"
            - "Perc_Stick"
            - "Perc_Tamb_A"
            - "Perc_Tamb_B"
            - "Perc_Tamb_C"
            - "Perc_Tamb_D"
            - "Perc_Teeth"
            - "Perc_Tongue"
            - "Perc_TrashCan"
            - "Perc_WhistleParty"
            - "Perc_WhistleRef"
            - "Synth_Bell_A"
            - "Synth_Bell_B"
            - "Synth_Block_A"
            - "Synth_Block_B"
            - "Synth_Block_C"
            - "Synth_Block_D"
            - "Synth_Block_E"
            - "Synth_Block_F"
            - "Synth_Block_G"
            - "Synth_Block_H"
            - "Synth_Sine_A"
            - "Synth_Sine_B"
            - "Synth_Sine_C"
            - "Synth_Sine_D"
            - "Synth_Sine_E"
            - "Synth_Sine_F"
            - "Synth_Square_A"
            - "Synth_Square_B"
            - "Synth_Square_C"
            - "Synth_Square_D"
            - "Synth_Square_E"
            - "Synth_Tick_A"
            - "Synth_Tick_B"
            - "Synth_Tick_C"
            - "Synth_Tick_D"
            - "Synth_Tick_E"
            - "Synth_Tick_F"
            - "Synth_Tick_G"
            - "Synth_Tick_H"
            - "Synth_Weird_A"
            - "Synth_Weird_B"
            - "Synth_Weird_C"
            - "Synth_Weird_D"
            - "Synth_Weird_E"
          custom_value: true

    accent_enabled:
      name: Accent beat 1
      description: >
        When enabled, beat 1 of each measure uses the _hi sound (a different tonal
        recording — sharper transient, distinct character from the regular _lo click).
        Disable to make every beat identical.
      default: true
      selector:
        boolean:

    bpm_step:
      name: BPM change per rotation step
      description: How many BPM to add/subtract per ZHA step event.
      default: 2
      selector:
        number:
          min: 1
          max: 20
          step: 1
          mode: box

    double_tap_window_ms:
      name: Double-tap window (ms)
      description: >
        Maximum gap between two presses to count as a double-tap.
        Shorter = less chance of accidental double-taps; longer = easier to trigger.
      default: 400
      selector:
        number:
          min: 150
          max: 800
          step: 50
          unit_of_measurement: ms
          mode: slider

    measure_mode_timeout_s:
      name: Beats-per-measure mode timeout (s)
      description: >
        Seconds of inactivity before beats-per-measure mode auto-exits.
      default: 5
      selector:
        number:
          min: 2
          max: 30
          step: 1
          unit_of_measurement: s
          mode: box

    press_command:
      name: Knob press command
      description: ZHA command fired on press.  Usually "toggle".
      default: "toggle"
      selector:
        text:

    rotate_command:
      name: Rotation command
      description: ZHA command fired on rotation.  Usually "step".
      default: "step"
      selector:
        text:

    rotate_cw_mode:
      name: Clockwise direction value
      description: >
        For `step` / `move_with_on_off` rotation: raw value that means
        "clockwise / increase" (e.g. step_mode 0). Ignored for Tuya `right` / `left` events.
      default: 0
      selector:
        number:
          min: 0
          max: 3
          step: 1
          mode: box

    rotate_ccw_mode:
      name: Counter-clockwise direction value
      description: >
        For `step` / `move_with_on_off` rotation: raw value that means
        "counter-clockwise / decrease" (e.g. step_mode 1). Ignored for Tuya `right` / `left` events.
      default: 1
      selector:
        number:
          min: 0
          max: 3
          step: 1
          mode: box

    tuya_invert_left_right:
      name: Invert Tuya left/right
      description: >
        If tempo goes the wrong way when using `right` / `left` `zha_event` commands, enable this
        to swap the direction. Only affects `left` / `right`, not `step` or `rotate_type`.
      default: false
      selector:
        boolean:

    invert_rotate_type:
      name: Invert rotate_type direction
      description: >
        If you use `rotate_type` events and tempo moves the wrong way, toggle this. Only applies
        when "React to rotate_type" is on.
      default: false
      selector:
        boolean:

    react_to_step:
      name: "React to rotation: step (level) command"
      description: >
        Handle `zha_event` with `command` equal to **Rotation command** (default `step`). Set to
        **off** if your device also fires duplicate `left` / `right` / `rotate_type` for the same
        turn and you want to use a different option only.
      default: true
      selector:
        boolean:

    react_to_left_right:
      name: "React to rotation: `left` / `right`"
      description: >
        Handle Tuya / scene `command: left` and `right`. Set **off** if you use `rotate_type` or
        `step` only to avoid double rotation.
      default: true
      selector:
        boolean:

    react_to_rotate_type:
      name: "React to rotation: `rotate_type`"
      description: >
        Handle Tuya `command: rotate_type` (direction often in `params` or `args`). Recommended **on**
        and the other two rotation toggles **off** on devices that report `step` + `left` + `rotate_type`
        for one detent, so one turn causes a single `ha_metronome.rotate` call.
      default: false
      selector:
        boolean:

# ---------------------------------------------------------------------------
# Triggers
# ---------------------------------------------------------------------------
# One trigger for the whole device: every ZHA event (press + all rotation command variants).
# Which commands actually call rotate is gated in `action` by the react_to_* inputs.
# ---------------------------------------------------------------------------
trigger:
  - id: zha_knob
    platform: event
    event_type: zha_event
    event_data:
      device_id: !input knob_device

# ---------------------------------------------------------------------------
# Variables
# ---------------------------------------------------------------------------
variables:
  press_cmd: !input press_command
  rot_cmd: !input rotate_command
  cw_mode: !input rotate_cw_mode
  ccw_mode: !input rotate_ccw_mode
  tuya_invert: !input tuya_invert_left_right
  invert_rt: !input invert_rotate_type
  react_to_step: !input react_to_step
  react_to_lr: !input react_to_left_right
  react_to_rt: !input react_to_rotate_type

# ---------------------------------------------------------------------------
# Actions
# ---------------------------------------------------------------------------
action:
  - choose:

    # ---- PRESS (same `zha_knob` trigger: match command only) ---------------
    - conditions:
        - condition: template
          value_template: >
            {{ trigger.event.data.get('command') | string | lower
               == (press_cmd | string | lower) }}
      sequence:
        - service: ha_metronome.press
          data:
            media_player: !input media_player
            bpm: !input initial_bpm
            beats_per_measure: !input beats_per_measure
            sound: !input click_sound
            accent_enabled: !input accent_enabled
            double_tap_window_ms: !input double_tap_window_ms
            measure_mode_timeout_s: !input measure_mode_timeout_s

    # ---- ROTATE: `rotate_type` (Tuya; direction in params/args) -----------
    - conditions:
        - condition: template
          value_template: >
            {{ react_to_rt
               and trigger.event.data.get('command') | string | lower
               == 'rotate_type' }}
      sequence:
        - variables:
            direction: >-
              {% set p = trigger.event.data.get('params') or {} %}
              {% set r = p.get('rotate_type') if p is mapping else none %}
              {% if r is none %}
                {% set a = trigger.event.data.get('args') or [] %}
                {% set r = a[0] if a | length > 0 else 0 %}
              {% endif %}
              {% set ri = (r|default(0))|int(0) %}
              {% set base = 1 if ri == 0 else -1 %}
              {{ -base if invert_rt else base }}
        - service: ha_metronome.rotate
          data:
            direction: "{{ direction | int(0) }}"
            bpm_step: !input bpm_step
            measure_mode_timeout_s: !input measure_mode_timeout_s

    # ---- ROTATE: Tuya / scene `left` / `right` -------------------------------
    - conditions:
        - condition: template
          value_template: >
            {{ react_to_lr
               and (trigger.event.data.get('command') | string | lower) in
                   ['left', 'right'] }}
      sequence:
        - variables:
            direction: >-
              {% set c = trigger.event.data.get('command') | string | lower %}
              {% if c == 'right' %}
                {{ -1 if tuya_invert else 1 }}
              {% else %}
                {{ 1 if tuya_invert else -1 }}
              {% endif %}
        - service: ha_metronome.rotate
          data:
            direction: "{{ direction | int(0) }}"
            bpm_step: !input bpm_step
            measure_mode_timeout_s: !input measure_mode_timeout_s

    # ---- ROTATE: `step` / `move_with_on_off` (level) -------------------------
    - conditions:
        - condition: template
          value_template: >
            {{ react_to_step
               and trigger.event.data.get('command') | string | lower
               == (rot_cmd | string | lower) }}
      sequence:
        - variables:
            step_mode_raw: >-
              {{ trigger.event.data.params.step_mode
                 | default(trigger.event.data.params.move_mode,  true)
                 | default(trigger.event.data.step_mode,         true)
                 | default(trigger.event.data.move_mode,         true)
                 | default(0) | int }}
            direction: >-
              {{ 1 if step_mode_raw == (cw_mode | int) else -1 }}
        - service: ha_metronome.rotate
          data:
            direction: "{{ direction }}"
            bpm_step: !input bpm_step
            measure_mode_timeout_s: !input measure_mode_timeout_s

# queued so rapid rotation events don't get dropped
mode: queued
max: 10
