blueprint:
  name: "Metronome — ZHA Knob Controller"
  description: >
    Control the HA Metronome custom component with a ZHA knob/remote that emits:

    - `command: remote_button_short_press` for a press
    - `command: remote_button_double_press` for a double-press
    - `command: left` / `right` for rotation

    **Press** toggles start/stop (and starts streaming to the chosen media player).
    **Double-press** enters beats-per-measure adjustment mode.
    **Rotate** adjusts tempo (or beats-per-measure when the component is in that mode).

    If your device uses different command names, this simplified blueprint will not match them.

  domain: automation

  input:
    knob_device:
      name: Knob (ZHA device)
      description: Select your rotary knob. The trigger matches `zha_event` for this device id.
      selector:
        device:
          integration: zha

    media_player:
      name: Media Player
      description: Speaker to stream the click track to.
      selector:
        entity:
          domain: media_player

    initial_bpm:
      name: Initial BPM
      description: Tempo used each time the metronome (re)starts.
      default: 120
      selector:
        number:
          min: 20
          max: 300
          step: 1
          unit_of_measurement: BPM
          mode: slider

    beats_per_measure:
      name: Initial beats per measure
      description: Starting value; can be changed later via double-tap.
      default: 4
      selector:
        number:
          min: 1
          max: 16
          step: 1
          mode: box

    click_sound:
      name: Click sound
      description: Sound set to use (without _hi/_lo.wav suffix).
      default: "Perc_MetronomeQuartz"
      selector:
        select:
          options:
            - "Perc_Can"
            - "Perc_Castanet"
            - "Perc_Chair"
            - "Perc_Clackhead"
            - "Perc_Clap"
            - "Perc_ClickToy"
            - "Perc_Glass"
            - "Perc_HeadKnock"
            - "Perc_Keyboard"
            - "Perc_Metal"
            - "Perc_MetronomeQuartz"
            - "Perc_MouthPop"
            - "Perc_MusicStand"
            - "Perc_PracticePad"
            - "Perc_Snap"
            - "Perc_Squeak"
            - "Perc_Stick"
            - "Perc_Tamb_A"
            - "Perc_Tamb_B"
            - "Perc_Tamb_C"
            - "Perc_Tamb_D"
            - "Perc_Teeth"
            - "Perc_Tongue"
            - "Perc_TrashCan"
            - "Perc_WhistleParty"
            - "Perc_WhistleRef"
            - "Synth_Bell_A"
            - "Synth_Bell_B"
            - "Synth_Block_A"
            - "Synth_Block_B"
            - "Synth_Block_C"
            - "Synth_Block_D"
            - "Synth_Block_E"
            - "Synth_Block_F"
            - "Synth_Block_G"
            - "Synth_Block_H"
            - "Synth_Sine_A"
            - "Synth_Sine_B"
            - "Synth_Sine_C"
            - "Synth_Sine_D"
            - "Synth_Sine_E"
            - "Synth_Sine_F"
            - "Synth_Square_A"
            - "Synth_Square_B"
            - "Synth_Square_C"
            - "Synth_Square_D"
            - "Synth_Square_E"
            - "Synth_Tick_A"
            - "Synth_Tick_B"
            - "Synth_Tick_C"
            - "Synth_Tick_D"
            - "Synth_Tick_E"
            - "Synth_Tick_F"
            - "Synth_Tick_G"
            - "Synth_Tick_H"
            - "Synth_Weird_A"
            - "Synth_Weird_B"
            - "Synth_Weird_C"
            - "Synth_Weird_D"
            - "Synth_Weird_E"
          custom_value: true

    accent_enabled:
      name: Accent beat 1
      description: >
        When enabled, beat 1 of each measure uses the _hi sound (a different tonal
        recording — sharper transient, distinct character from the regular _lo click).
        Disable to make every beat identical.
      default: true
      selector:
        boolean:

    bpm_step:
      name: BPM change per rotation step
      description: How many BPM to add/subtract per ZHA step event.
      default: 2
      selector:
        number:
          min: 1
          max: 20
          step: 1
          mode: box

    double_tap_window_ms:
      name: Double-tap window (ms)
      description: >
        Maximum gap between two presses to count as a double-tap.
        Shorter = less chance of accidental double-taps; longer = easier to trigger.
      default: 400
      selector:
        number:
          min: 150
          max: 800
          step: 50
          unit_of_measurement: ms
          mode: slider

    measure_mode_timeout_s:
      name: Beats-per-measure mode timeout (s)
      description: >
        Seconds of inactivity before beats-per-measure mode auto-exits.
      default: 5
      selector:
        number:
          min: 2
          max: 30
          step: 1
          unit_of_measurement: s
          mode: box

    invert_left_right:
      name: Invert left/right
      description: >
        If tempo goes the wrong way, enable this to swap direction for `left` / `right`.
      default: false
      selector:
        boolean:

# ---------------------------------------------------------------------------
# Triggers
# ---------------------------------------------------------------------------
# Every `zha_event` for the selected ZHA device (registry device id, same as `device_id` in the event).
# Which commands run press vs rotate is decided in `action`.
# ---------------------------------------------------------------------------
trigger:
  - id: zha_knob
    platform: event
    event_type: zha_event
    event_data:
      device_id: !input knob_device

# ---------------------------------------------------------------------------
# Variables
# ---------------------------------------------------------------------------
variables:
  invert_lr: !input invert_left_right

# ---------------------------------------------------------------------------
# Actions
# ---------------------------------------------------------------------------
action:
  - choose:

    # ---- PRESS (same `zha_knob` trigger: match command only) ---------------
    - conditions:
        - condition: template
          value_template: >
            {{ trigger.event.data.get('command') | string | lower == 'remote_button_short_press' }}
      sequence:
        - service: ha_metronome.press
          data:
            media_player: !input media_player
            bpm: !input initial_bpm
            beats_per_measure: !input beats_per_measure
            sound: !input click_sound
            accent_enabled: !input accent_enabled
            measure_mode_timeout_s: !input measure_mode_timeout_s

    # ---- DOUBLE-PRESS: enter beats-per-measure adjustment mode -------------
    - conditions:
        - condition: template
          value_template: >
            {{ trigger.event.data.get('command') | string | lower == 'remote_button_double_press' }}
      sequence:
        - service: ha_metronome.enter_measure_mode
          data:
            measure_mode_timeout_s: !input measure_mode_timeout_s

    # ---- ROTATE: `left` / `right` ----------------------------------------
    - conditions:
        - condition: template
          value_template: >
            {{ (trigger.event.data.get('command') | string | lower) in ['left', 'right'] }}
      sequence:
        - variables:
            direction: >-
              {% set c = trigger.event.data.get('command') | string | lower %}
              {% if c == 'right' %}
                {{ -1 if invert_lr else 1 }}
              {% else %}
                {{ 1 if invert_lr else -1 }}
              {% endif %}
        - service: ha_metronome.rotate
          data:
            direction: "{{ direction | int(0) }}"
            bpm_step: !input bpm_step
            measure_mode_timeout_s: !input measure_mode_timeout_s

# queued so rapid rotation events don't get dropped
mode: queued
max: 10
