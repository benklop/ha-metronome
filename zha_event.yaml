# Example `zha_event` trace from a Tuya-style smart scene knob (C3006 / TS004F family) on one
# detent. Order is chronological (oldest time_fired first):
#   1) cluster 0x0006, command: left
#   2) cluster 0x0006, command: rotate_type  (params.rotate_type, args; same sub-ms window as 1)
#   3) cluster 0x0008 (level), command: step  (params.step_mode, step_size, … ~0.25s later)
#
# The metronome blueprint (react_to_* options) should enable only *one* of: left/right, rotate_type,
# or step — otherwise the same turn triggers multiple ha_metronome.rotate calls. Prefer left/right or
# rotate_type for the lowest latency; `step` alone works but is delayed.
#
# (IDs / IEEE in this file are from a real device; replace with your own when testing.)
#
# If you get no `zha_event` when rotating, see "Troubleshooting" (README) and
# `examples/diagnostics_zha_knob_event.yaml`. The metronome blueprint subscribes by the
# **device** you select; `device_id` below should match that device in Settings → Devices.
# `device_ieee` is also in every event and is what the diagnostic example uses.
#---------------------------------------------------------------------------------------------------
# --- 1) left (earliest) ---------------------------------------------------------------------------
event_type: zha_event
data:
  device_ieee: a4:c1:38:48:77:3e:71:6e
  device_id: 787ff31c162df06b3bceb38f2b0fbfe0
  unique_id: a4:c1:38:48:77:3e:71:6e:1:0x0006
  endpoint_id: 1
  cluster_id: 6
  command: left
  args: []
  params: {}
origin: LOCAL
time_fired: "2026-04-27T18:08:22.789884+00:00"
context:
  id: 01KQ821J85RJETPK9VWFH03TZK
  parent_id: null
  user_id: null
